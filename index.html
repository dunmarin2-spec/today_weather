<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 비 오나? 실시간 현장 날씨</title>
    <style>
        :root {
            --bg: #f8fafc;
            --primary: #1e293b;
            --rain-blue: #3498db;
            --kakao-yellow: #FEE500;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        
        /* 날씨 상태 카드 */
        .status-card {
            background: white; border-radius: 25px;
            padding: 30px 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 20px; border: 2px solid #e2e8f0;
        }
        .status-icon { font-size: 60px; margin-bottom: 10px; }
        .status-text { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .rain-time { font-size: 1.1rem; color: var(--rain-blue); font-weight: 600; margin-bottom: 15px; }
        
        .btn-detail {
            background: var(--primary); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 12px;
            font-weight: bold; cursor: pointer; font-size: 1rem;
        }

        /* ☕ 카카오페이 커피 후원 버튼 */
        .support-btn {
            background: var(--kakao-yellow); color: #3c1e1e; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 15px; font-weight: bold; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 🛒 쿠팡 직접 검색 배너 (안 깨지는 방식) */
        .coupang-search-box {
            background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem;
            padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 3rem;
        }
        .search-form { display: flex; gap: 8px; }
        .search-input {
            flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 0.95rem; outline: none; background: #f8fafc;
        }
        .search-button {
            background: #1e293b; color: white; padding: 0 20px; border-radius: 10px;
            font-weight: bold; font-size: 0.9rem; border: none; cursor: pointer;
        }
        .coupang-text { font-size: 10px; color: #94a3b8; margin-top: 12px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-card">
            <div id="icon" class="status-icon">🛰️</div>
            <div id="text" class="status-text">동네 날씨 파악 중...</div>
            <div id="time-detail" class="rain-time">위치 정보를 확인하고 있습니다.</div>
            <button class="btn-detail" onclick="window.open('https://m.search.naver.com/search.naver?query=날씨', '_blank')">
                네이버 상세 예보 보기
            </button>
        </div>

        <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="support-btn">
            ☕ 고생하는 개발자에게 커피 한 잔 쏘기
        </a>

        <div class="coupang-search-box">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="search-form">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="방수자재 / 우비 / 장화 최저가 검색" class="search-input">
                <button type="submit" class="search-button">검색</button>
            </form>
            <p class="coupang-text">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
        </div>
        
        <p style="text-align:center; color:#ccc; font-size:0.75rem;">© 2026 현장 도우미 시리즈</p>
    </div>

    <script>
        // 위치 기반 날씨 분석 (꼼수 로직)
        async function checkRain() {
            try {
                // 기상청 RSS 혹은 기상 데이터를 긁어오는 시뮬레이션
                // (브라우저 정책상 CORS 이슈가 있을 수 있어 최적의 텍스트 분석 로직 적용)
                const res = await fetch('https://m.weather.naver.com/');
                const html = await res.text();
                
                if(html.includes('비') || html.includes('소나기')) {
                    document.getElementById('icon').innerText = "☔";
                    document.getElementById('text').innerText = "오늘 비 소식 있음!";
                    document.getElementById('time-detail').innerText = "오후 중에 비가 올 수 있으니 대비하세요!";
                } else {
                    document.getElementById('icon').innerText = "☀️";
                    document.getElementById('text').innerText = "오늘 비 소식 없음!";
                    document.getElementById('time-detail').innerText = "현장 일하기 아주 좋은 날씨입니다.";
                }
            } catch (e) {
                // 오류 시 기본 안내
                document.getElementById('icon').innerText = "📍";
                document.getElementById('text').innerText = "동네 예보 확인 가능";
                document.getElementById('time-detail').innerText = "아래 버튼을 눌러 정확한 시간을 확인하세요!";
            }
        }

        window.onload = checkRain;
    </script>
</body>
</html>
