<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 방수/도장 작업지수</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --primary: #1e293b;
            --safe: #2ecc71;
            --warn: #f39c12;
            --danger: #e74c3c;
            --kakao: #FEE500;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        
        /* 작업 지수 카드 */
        .index-card {
            background: white; border-radius: 25px;
            padding: 30px 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px; border: 3px solid #ddd;
        }
        .index-score { font-size: 4rem; font-weight: 900; margin: 10px 0; }
        .index-status { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .index-desc { font-size: 1rem; color: #64748b; line-height: 1.5; margin-bottom: 20px; }
        
        /* 상세 수치 */
        .detail-box {
            display: flex; justify-content: space-around;
            background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px;
        }
        .detail-item { font-size: 0.9rem; color: #334155; }
        .detail-item b { display: block; font-size: 1.1rem; color: var(--primary); }

        /* 후원 및 검색 */
        .support-btn {
            background: var(--kakao); color: #3c1e1e; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            padding: 16px; border-radius: 15px; font-weight: bold; margin-bottom: 20px;
        }
        .coupang-search-box {
            background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem;
            padding: 1.5rem; margin-bottom: 3rem;
        }
        .search-form { display: flex; gap: 8px; }
        .search-input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; outline: none; }
        .search-button { background: #1e293b; color: white; padding: 0 20px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="index-card" id="card-border">
            <div style="font-size: 0.9rem; color: #64748b;">오늘의 방수/도장 작업지수</div>
            <div class="index-score" id="score">--</div>
            <div class="index-status" id="status">분석 중...</div>
            <div class="index-desc" id="desc">현장 기상 데이터를 분석하고 있습니다.</div>
            
            <div class="detail-box">
                <div class="detail-item">현재기온<b id="temp">--℃</b></div>
                <div class="detail-item">현재습도<b id="humi">--%</b></div>
                <div class="detail-item">비 소식<b id="rain">--</b></div>
            </div>
            <button onclick="location.reload()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; background:none; cursor:pointer;">정보 업데이트</button>
        </div>

        <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="support-btn">
            ☕ 현장 전문가를 위한 커피 후원 (카카오)
        </a>

        <div class="coupang-search-box">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="search-form">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="방수자재 / 우레탄 / 도장공구 검색" class="search-input">
                <button type="submit" class="search-button">검색</button>
            </form>
            <p style="font-size: 10px; color: #94a3b8; margin-top: 12px; text-align: center;">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
        </div>
    </div>

    <script>
        async function analyzeWeather() {
            try {
                // 꼼수 로직: 기상청 혹은 날씨 데이터를 텍스트로 분석
                const res = await fetch('https://m.weather.naver.com/');
                const html = await res.text();
                
                // 임의 수치 추출 (실제로는 API 권장이나 꼼수 시뮬레이션)
                let temp = 18; // 예시 온도
                let humi = 65; // 예시 습도
                let rain = html.includes('비') ? "있음" : "없음";

                // 전문가 로직 적용
                let score = 100;
                let status = "작업 최적";
                let desc = "기온, 습도 모두 완벽합니다. 오늘 작업 진행하세요!";
                let color = "var(--safe)";

                if (rain === "있음") {
                    score = 20; status = "작업 중단"; desc = "비 소식이 있습니다. 방수/도장 작업 시 하자가 발생할 수 있습니다."; color = "var(--danger)";
                } else if (humi > 80) {
                    score = 40; status = "작업 주의"; desc = "습도가 너무 높습니다. 건조가 늦어지거나 들뜸 현상이 생길 수 있습니다."; color = "var(--warn)";
                } else if (temp < 5) {
                    score = 30; status = "작업 금지"; desc = "영하권 혹은 저온으로 인해 양생이 불가능합니다."; color = "var(--danger)";
                }

                // 화면 업데이트
                document.getElementById('score').innerText = score;
                document.getElementById('score').style.color = color;
                document.getElementById('status').innerText = status;
                document.getElementById('status').style.color = color;
                document.getElementById('desc').innerText = desc;
                document.getElementById('card-border').style.borderColor = color;
                document.getElementById('temp').innerText = temp + "℃";
                document.getElementById('humi').innerText = humi + "%";
                document.getElementById('rain').innerText = rain;

            } catch (e) {
                document.getElementById('status').innerText = "데이터 연결 확인";
                document.getElementById('desc').innerText = "네트워크를 확인하거나 아래 버튼으로 네이버 날씨를 직접 보세요.";
            }
        }
        window.onload = analyzeWeather;
    </script>
</body>
</html>
