<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 날씨 전광판</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --primary-dark: #1e293b;
            --kakao-yellow: #FEE500;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        /* 상단 안내 문구 */
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 1.4rem; color: var(--primary-dark); margin: 0; }
        .header p { font-size: 0.85rem; color: #64748b; margin: 5px 0 0; }

        /* 날씨 프레임 (꼼수의 핵심) */
        .weather-frame-box {
            width: 100%; height: 500px; /* 높이를 충분히 줌 */
            background: white; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden; border: 2px solid #e2e8f0;
            margin-bottom: 20px; position: relative;
        }
        /* iframe으로 네이버 모바일 날씨 유도 */
        iframe {
            width: 100%; height: 100%; border: none;
        }

        /* 후원 버튼 */
        .support-btn {
            background: var(--kakao-yellow); color: #3c1e1e;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 안 깨지는 쿠팡 검색창 */
        .coupang-search-box {
            background: white; border: 1px solid #e2e8f0; border-radius: 1rem;
            padding: 1.25rem; margin-bottom: 2rem;
        }
        .search-form { display: flex; gap: 0.5rem; }
        .search-input {
            flex-grow: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 0.75rem;
            font-size: 0.9rem; background: #f8fafc; outline: none;
        }
        .search-button {
            background: #1e293b; color: white; padding: 0 1.25rem; border-radius: 0.75rem;
            font-weight: bold; font-size: 0.8rem; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>☀️ 현장 날씨 전광판</h1>
            <p>오늘 비 오나? 미세먼지 심한가? 한눈에 확인!</p>
        </div>

        <div class="weather-frame-box">
            <iframe src="https://m.search.naver.com/search.naver?query=날씨" id="weather-iframe"></iframe>
        </div>

        <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="support-btn">
            ☕ 고생하는 개발자 커피 한 잔 사주기
        </a>

        <div class="coupang-search-box">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="search-form">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="현장 용품 / 방수 자재 검색" class="search-input">
                <button type="submit" class="search-button">검색</button>
            </form>
            <p style="font-size: 9px; color: #94a3b8; margin-top: 10px; text-align: center;">
                "이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."
            </p>
        </div>
        
        <p style="text-align: center; font-size: 0.7rem; color: #bbb; margin-bottom: 30px;">
            © 2026 현장 도우미 앱 시리즈
        </p>
    </div>

</body>
</html>
