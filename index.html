<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 날씨 전광판</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --primary: #1e293b;
            --kakao-yellow: #FEE500;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--primary); margin: 0; letter-spacing: -1px; }
        
        /* 날씨 위젯 박스 */
        .weather-card {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 10px; border: 1px solid #e2e8f0;
            margin-bottom: 20px; text-align: center;
            min-height: 250px;
        }

        /* 카카오 후원 */
        .support-btn {
            background: var(--kakao-yellow); color: #3c1e1e;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 15px; font-weight: bold; margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 쿠팡 안 깨지는 검색창 */
        .coupang-search-box {
            background: white; border: 1px solid #e2e8f0; border-radius: 1rem;
            padding: 1.25rem; margin-bottom: 2rem;
        }
        .search-form { display: flex; gap: 0.5rem; }
        .search-input {
            flex-grow: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 0.75rem;
            font-size: 0.9rem; outline: none;
        }
        .search-button {
            background: #1e293b; color: white; padding: 0 1.25rem; border-radius: 0.75rem;
            font-weight: bold; font-size: 0.8rem; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>☀️ 현장 날씨 전광판</h1>
            <p style="color:#64748b; font-size:0.8rem;">오늘 비 오나? 미세먼지 어떤가?</p>
        </div>

        <div class="weather-card">
            <iframe src="https://www.weather.go.kr/w/wnuri-fct2021/main/current-weather.do" 
                    style="width:100%; height:280px; border:none; border-radius:15px;"></iframe>
            <p style="font-size: 10px; color: #ccc; margin-top: 5px;">기상청 날씨 정보 제공</p>
        </div>

        <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="support-btn">
            ☕ 현장 형님들 커피 후원하기
        </a>

        <div class="coupang-search-box">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="search-form">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="방수자재 / 현장공구 검색" class="search-input">
                <button type="submit" class="search-button">검색</button>
            </form>
            <p style="font-size: 9px; color: #94a3b8; margin-top: 10px; text-align: center;">
                "이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."
            </p>
        </div>
        
    </div>

</body>
</html>
