<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 방수/도장 작업지수</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --primary: #1e293b;
            --safe: #2ecc71;
            --warn: #f39c12;
            --danger: #e74c3c;
            --kakao: #FEE500;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        
        /* 작업 지수 카드 */
        .index-card {
            background: white; border-radius: 25px;
            padding: 30px 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px; border: 3px solid #ddd;
        }
        .index-score { font-size: 4rem; font-weight: 900; margin: 10px 0; }
        .index-status { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .index-desc { font-size: 1rem; color: #64748b; line-height: 1.5; margin-bottom: 20px; }
        
        /* 상세 수치 */
        .detail-box {
            display: flex; justify-content: space-around;
            background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px;
        }
        .detail-item { font-size: 0.85rem; color: #334155; }
        .detail-item b { display: block; font-size: 1.1rem; color: var(--primary); margin-top: 5px; }

        .support-btn {
            background: var(--kakao); color: #3c1e1e; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            padding: 16px; border-radius: 15px; font-weight: bold; margin-bottom: 20px;
        }
        .coupang-search-box {
            background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem;
            padding: 1.5rem; margin-bottom: 3rem;
        }
        .search-form { display: flex; gap: 8px; }
        .search-input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; outline: none; }
        .search-button { background: #1e293b; color: white; padding: 0 20px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="index-card" id="card-border">
            <div style="font-size: 0.9rem; color: #64748b;">현 위치 방수/도장 작업지수</div>
            <div class="index-score" id="score">--</div>
            <div class="index-status" id="status">위치 확인 중...</div>
            <div class="index-desc" id="desc">GPS를 통해 현장 데이터를 불러오는 중입니다.</div>
            
            <div class="detail-box">
                <div class="detail-item">현 기온<b id="temp">--℃</b></div>
                <div class="detail-item">현 습도<b id="humi">--%</b></div>
                <div class="detail-item">비 올 확률<b id="rain">--%</b></div>
            </div>
            <button onclick="getLocation()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; background:none; cursor:pointer; font-weight:bold;">새로고침 (위치허용 필수)</button>
        </div>

        <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="support-btn">
            ☕ 현장 전문가용 앱 후원하기 (카카오)
        </a>

        <div class="coupang-search-box">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="search-form">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="방수자재 / 우레탄 / 안전화 검색" class="search-input">
                <button type="submit" class="search-button">검색</button>
            </form>
            <p style="font-size: 10px; color: #94a3b8; margin-top: 12px; text-align: center;">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
        </div>
    </div>

    <script>
        // GPS 위치 가져오기
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(fetchWeather, showError);
            } else {
                alert("GPS를 지원하지 않는 브라우저입니다.");
            }
        }

        async function fetchWeather(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            try {
                // 공공 데이터 브릿지 사용 (무료/키 불필요/CORS 없음)
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation&hourly=precipitation_probability&timezone=auto&forecast_days=1`;
                const res = await fetch(url);
                const data = await res.json();

                const temp = data.current.temperature_2m;
                const humi = data.current.relative_humidity_2m;
                const rainProb = data.hourly.precipitation_probability[new Date().getHours()];
                const isRaining = data.current.precipitation > 0;

                updateUI(temp, humi, rainProb, isRaining);
            } catch (e) {
                document.getElementById('status').innerText = "데이터 오류";
                document.getElementById('desc').innerText = "날씨 정보를 가져오지 못했습니다.";
            }
        }

        function updateUI(temp, humi, rainProb, isRaining) {
            let score = 100;
            let status = "작업 최적";
            let desc = "기온, 습도 모두 완벽합니다. 오늘 작업 진행하세요!";
            let color = "var(--safe)";

            // 형님의 방수 전문가 로직 적용
            if (isRaining || rainProb > 40) {
                score = 10; status = "작업 금지"; desc = "비 소식이 있습니다. 방수/도장 작업 시 박리 하자가 발생합니다!"; color = "var(--danger)";
            } else if (humi > 80) {
                score = 40; status = "습도 주의"; desc = "습도가 너무 높습니다. 완전 건조가 어려워 들뜸 현상이 생길 수 있습니다."; color = "var(--warn)";
            } else if (temp < 5) {
                score = 30; status = "저온 주의"; desc = "기온이 너무 낮아 양생이 불가능합니다. 열풍기 작업이 필요합니다."; color = "var(--danger)";
            } else if (temp > 35) {
                score = 50; status = "고온 주의"; desc = "너무 뜨겁습니다. 도료가 너무 빨리 말라 작업성이 떨어집니다."; color = "var(--warn)";
            }

            document.getElementById('score').innerText = score;
            document.getElementById('score').style.color = color;
            document.getElementById('status').innerText = status;
            document.getElementById('status').style.color = color;
            document.getElementById('desc').innerText = desc;
            document.getElementById('card-border').style.borderColor = color;
            document.getElementById('temp').innerText = temp + "℃";
            document.getElementById('humi').innerText = humi + "%";
            document.getElementById('rain').innerText = rainProb + "%";
        }

        function showError(error) {
            alert("위치 정보를 허용해주셔야 동네 날씨 분석이 가능합니다.");
        }

        window.onload = getLocation;
    </script>
</body>
</html>
